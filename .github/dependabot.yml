version: 2
updates:
  # Fetch and update latest `npm` packages
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: saturday
      time: "00:00"
      timezone: Asia/Taipei
    open-pull-requests-limit: 10
    labels:
      - dependencies
    groups:
      all-dependencies:
        update-types:
          - minor
          - patch
    commit-message:
      prefix: fix
      prefix-development: chore
      include: scope
    assignees:
      - assanges

  # Fetch and update latest `github-actions` pkgs
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: saturday
      time: "00:00"
      timezone: Asia/Taipei
    open-pull-requests-limit: 10
    labels:
      - dependencies
    groups:
      all-dependencies:
        update-types:
          - minor
          - patch
    commit-message:
      prefix: fix
      prefix-development: chore
      include: scope
    assignees:
      - assanges
